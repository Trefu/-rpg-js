<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rpg</title>
    <link rel="stylestylesheetsheet" href="https://unpkg.com/sanitize.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <!--Medieval Font-->
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="/favico.ico" type="image/x-icon">
</head>

<body>

    <div id="nav"></div>

    <div id="main-content">
        <p id="text-header" class="h1 text-info">Choose Avatar</p>

        <div class="choose-class-card">
            <div class="choose-class-card-content">
                <div class="d-flex flex-col">
                    <h4 id="warrior-title"><b></b></h4>
                    <p>HP: <small id="warrior-life"></small></p>
                    <p>STR:<small id="warrior-str"></small></p>
                    <p>DEX:<small id="warrior-dex"></small></p>
                    <button data-class="battlemaster" id="battlemaster-select-btn" class="btn-select-class">Select</button>
                </div>
                <img class="avatar-image" src="Images/avatars/warrior.png" alt="">
            </div>
        </div>

    </div>
    <div id="main-content">
        <div class="choose-class-card">
            <div class="choose-class-card-content">
                <div class="d-flex flex-col">
                    <h4 id="rogue-title"><b>ROGUE</b></h4>
                    <p>LIFE:<small id="rogue-life"></small></p>
                    <p>STR:<small id="rogue-str"></small></p>
                    <p>DEX:<small id="rogue-dex"></small></p>
                    <button data-class="shadowmaster" id="shadowmaster-select-btn" class="btn-select-class">Select</button>
                </div>
                <img class=" avatar-image" src="Images/avatars/rogue.png" alt="">
            </div>
        </div>

    </div>
    <div id="main-content">
        <div class="choose-class-card">
            <div class="choose-class-card-content">
                <div class="d-flex flex-col">
                    <h4 id="mage-title"><b>MAGE</b></h4>
                    <p>LIFE:<small id="mage-life"></small></p>
                    <p>STR:<small id="mage-str"></small></p>
                    <p>DEX:<small id="mage-dex"></small></p>
                    <button data-class="spellmaster" id="spellmaster-select-btn" class="btn-select-class">Select</button>
                </div>
                <img  class="avatar-image" src="Images/avatars/mage.png" alt="">
            </div>
        </div>

    </div>


    <!--Cargo el main js-->
    <script type="module" src="js/main.js"></script>
</body>

</html>
