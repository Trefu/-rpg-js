<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Character</title>
        <link rel="stylesheet" href="/css/styles.css">
        <link rel="preconnect" href="https://fonts.gstatic.com">
        <!--Medieval Font-->
        <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
        <link rel="shortcut icon" href="/favico.ico" type="image/x-icon">
    </head>
   
    <body>
        <div id="main-content-sheet">
   
            <div class="class-card-selected">
                <div class="class-card-content-selected  flex-col-selected">
                    <div class="d-flex-selected">
                        <div class="d-flex-selected flex-col-selected">
                            <h4 id="selectedCharacter-title"><b>Battlemaster</b></h4>
                            <p>HP: <small id="selectedCharacter-life"></small></p>
                            <p>STR:<small id="selectedCharacter-str"></small></p>
                            <p>DEX:<small id="selectedCharacter-dex"></small></p>
                        </div>
                        <div class="avatar-selected">
                            <img src="/Images/avatars/battlemaster.png" alt="">
                        </div>
                    </div>
                </div>
            </div>
        </div>    
    </body>
</html>
